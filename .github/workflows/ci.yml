name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2025-latest
        env:
          ACCEPT_EULA: Y
          MSSQL_PID: Developer
          MSSQL_SA_PASSWORD: ${{ secrets.QAHUB_CI_SA_PASSWORD }}
        ports:
          - 1433:1433
        options: >-
          --health-cmd "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P '$MSSQL_SA_PASSWORD' -C -Q 'SELECT 1'"
          --health-interval 10s --health-timeout 5s --health-retries 12 --health-start-period 30s
    env:
      QAHUB_TEST_CONNECTION: Server=localhost,1433;Database=QAHub_CI;User Id=sa;Password=${{ secrets.QAHUB_CI_SA_PASSWORD }};TrustServerCertificate=True
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: dotnet restore QAHub.slnx
      - run: dotnet build QAHub.slnx --no-restore --configuration Release
      - run: dotnet test QAHub.slnx --no-build --configuration Release
      - run: dotnet list QAHub.slnx package --vulnerable --include-transitive
      - run: npm ci
        working-directory: apps/web
      - run: npm run lint
        working-directory: apps/web
      - run: npm run build
        working-directory: apps/web
      - run: npm audit --audit-level=moderate
        working-directory: apps/web
      - run: docker build -f apps/api/Dockerfile -t qahub-api:ci .
      - run: docker build -f apps/web/Dockerfile -t qahub-web:ci .
